<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage4 - 实时热门影视监控大屏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a1628; color:#fff; font-family:'Microsoft YaHei',sans-serif; min-height:100vh; }
        .header { text-align:center; padding:24px 0 16px; background:linear-gradient(135deg,#0d1f3c,#1a3a6b); border-bottom:2px solid #2a5a9a; }
        .header h1 { font-size:24px; letter-spacing:3px; background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header .subtitle { color:#94a3b8; font-size:12px; margin-top:6px; }
        .main-container { display:flex; gap:16px; padding:16px; max-width:1200px; margin:0 auto; }
        .chart-panel { flex:3; background:rgba(255,255,255,0.03); border-radius:10px; padding:16px; border:1px solid rgba(255,255,255,0.06); }
        .chart-panel h3 { color:#94a3b8; font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .chart-panel h3 .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; animation:blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #barChart { display:flex; flex-direction:column; gap:6px; padding:4px 0; }
        .bar-row { display:flex; align-items:center; gap:8px; height:36px; }
        .bar-rank { width:24px; font-size:12px; text-align:center; flex-shrink:0; }
        .bar-rank-1 { color:#f59e0b; font-weight:bold; }
        .bar-rank-2 { color:#94a3b8; font-weight:bold; }
        .bar-rank-3 { color:#cd7f32; font-weight:bold; }
        .bar-track { flex:1; height:24px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden; position:relative; }
        .bar-fill { height:100%; border-radius:4px; transition:width 0.8s ease; min-width:4px; background:linear-gradient(90deg,#3b82f6,#8b5cf6); }
        .bar-fill.top1 { background:linear-gradient(90deg,#f59e0b,#f97316); }
        .bar-fill.top2 { background:linear-gradient(90deg,#94a3b8,#64748b); }
        .bar-fill.top3 { background:linear-gradient(90deg,#cd7f32,#a0522d); }
        .bar-label { width:160px; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; padding-left:4px; }
        .bar-count { width:60px; text-align:right; font-size:13px; font-weight:bold; color:#22c55e; flex-shrink:0; }
        .table-panel { flex:2; background:rgba(255,255,255,0.03); border-radius:10px; padding:16px; border:1px solid rgba(255,255,255,0.06); }
        .table-panel h3 { color:#94a3b8; font-size:13px; margin-bottom:10px; }
        table { width:100%; border-collapse:collapse; }
        thead th { color:#60a5fa; font-size:11px; padding:8px 6px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:left; font-weight:normal; }
        tbody td { padding:8px 6px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; }
        tbody tr:hover { background:rgba(96,165,250,0.08); }
        .rank-num { display:inline-block; width:22px; height:22px; line-height:22px; text-align:center; border-radius:5px; font-size:11px; font-weight:bold; }
        .rank-1 { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; }
        .rank-2 { background:linear-gradient(135deg,#94a3b8,#64748b); color:#fff; }
        .rank-3 { background:linear-gradient(135deg,#cd7f32,#a0522d); color:#fff; }
        .rank-other { background:rgba(255,255,255,0.1); color:#94a3b8; }
        .count-badge { background:rgba(34,197,94,0.15); color:#22c55e; padding:1px 8px; border-radius:10px; font-size:12px; font-weight:bold; }
        .status-bar { display:flex; justify-content:space-between; padding:8px 16px; background:rgba(255,255,255,0.02); border-top:1px solid rgba(255,255,255,0.06); color:#64748b; font-size:11px; }
        .empty-msg { text-align:center; color:#64748b; padding:60px 0; font-size:14px; }
        .empty-msg .icon { font-size:32px; margin-bottom:8px; }
        @media (max-width:768px) { .main-container{flex-direction:column;} .bar-label{width:100px;} }
    </style>
</head>
<body>
<div class="header">
    <h1>Stage 4 — 实时热门影视监控大屏</h1>
    <div class="subtitle">Real-Time Hot Movie Dashboard · 纯CSS条形图 · 无外部依赖</div>
</div>
<div class="main-container">
    <div class="chart-panel">
        <h3><span class="dot"></span> 实时点击排行榜</h3>
        <div id="barChart"><div class="empty-msg"><div class="icon">📊</div>等待数据加载...</div></div>
    </div>
    <div class="table-panel">
        <h3>📋 详细排行</h3>
        <table><thead><tr><th>排名</th><th>电影名称</th><th style="text-align:right">点击次数</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="3" style="text-align:center;color:#64748b;padding:30px;font-size:13px">等待数据...</td></tr></tbody></table>
    </div>
</div>
<div class="status-bar">
    <span>实时流模式 · 每2秒自动生成点击 · 排行榜实时变化</span>
    <span id="updateTime">--:--:--</span>
</div>
<script>
    const movieNames = {'101':'流浪地球','102':'给阿嫲的情书','103':'楚门的世界','104':'泰坦尼克号','105':'阿凡达','106':'盗梦空间','107':'霸王别姬','108':'喜剧之王'};
    const barChart = document.getElementById('barChart');
    const tableBody = document.getElementById('tableBody');

    async function fetchData() {
        try {
            const r = await (await fetch('/api/hot-movies?topN=10')).json();
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
            if (r.code===200 && r.data && r.data.length>0) {
                renderBars(r.data);
                renderTable(r.data);
            } else {
                barChart.innerHTML = '<div class="empty-msg"><div class="icon">⏳</div>暂无数据，请在IDEA中修改CSV后保存</div>';
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#64748b;padding:30px;font-size:13px">暂无数据，修改CSV后等待5秒刷新</td></tr>';
            }
        } catch(e) {
            barChart.innerHTML = '<div class="empty-msg"><div class="icon">⚠</div>连接中...</div>';
        }
    }

    function renderBars(movies) {
        const maxCount = movies[0].clickCount || 1;
        barChart.innerHTML = movies.map((m,i) => {
            const pct = Math.max(4, (m.clickCount / maxCount) * 100);
            const rankClass = i < 3 ? 'top' + (i+1) : '';
            const rankIcon = i == 0 ? '🥇' : i == 1 ? '🥈' : i == 2 ? '🥉' : (i+1);
            return '<div class="bar-row">' +
                '<div class="bar-rank bar-rank-'+(i+1)+'">'+rankIcon+'</div>' +
                '<div class="bar-track"><div class="bar-fill '+rankClass+'" style="width:'+pct.toFixed(1)+'%"></div></div>' +
                '<div class="bar-label">'+(movieNames[m.movieId]||'#'+m.movieId)+'</div>' +
                '<div class="bar-count">'+m.clickCount+'</div></div>';
        }).join('');
    }

    function renderTable(movies) {
        tableBody.innerHTML = movies.map((m,i) => {
            const rc = i < 3 ? 'rank-'+(i+1) : 'rank-other';
            return '<tr><td><span class="rank-num '+rc+'">'+(i+1)+'</span></td>' +
                '<td>'+(movieNames[m.movieId]||'#'+m.movieId)+'</td>' +
                '<td style="text-align:right"><span class="count-badge">'+m.clickCount+' 次</span></td></tr>';
        }).join('');
    }

    fetchData();
    setInterval(fetchData, 3000);
</script>
</body>
</html>
