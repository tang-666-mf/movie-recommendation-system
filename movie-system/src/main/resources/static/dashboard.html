<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时热门影视监控大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; color: #fff; font-family: 'Microsoft YaHei', sans-serif; min-height: 100vh; }
        .header { text-align: center; padding: 30px 0 20px; background: linear-gradient(135deg, #0d1f3c, #1a3a6b); border-bottom: 2px solid #2a5a9a; }
        .header h1 { font-size: 28px; letter-spacing: 4px; background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { color: #94a3b8; font-size: 13px; margin-top: 8px; }
        .nav-bar { display: flex; justify-content: center; gap: 4px; background: rgba(255,255,255,0.03); padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .nav-bar a { color: #94a3b8; text-decoration: none; padding: 8px 24px; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        .nav-bar a.active { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .nav-bar a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .main-container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .chart-panel { flex: 3; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.06); }
        .chart-panel h3 { color: #94a3b8; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .chart-panel h3 .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #hotChart { height: 500px; width: 100%; }
        .table-panel { flex: 2; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.06); }
        .table-panel h3 { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        thead th { color: #60a5fa; font-size: 12px; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        tbody td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
        tbody tr:hover { background: rgba(96,165,250,0.08); }
        .rank-num { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .rank-1 { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.1); color: #94a3b8; }
        .count-badge { background: rgba(34,197,94,0.15); color: #22c55e; padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06); color: #64748b; font-size: 12px; }
        .status-bar .live { color: #22c55e; display: flex; align-items: center; gap: 6px; }
        .status-bar .live .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: blink 1s infinite; }
        @media (max-width: 900px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>
<div class="header">
    <h1>实时热门影视监控大屏</h1>
    <div class="subtitle">Real-Time Hot Movie Dashboard | Structured Streaming + ECharts</div>
</div>
<div class="nav-bar">
    <a href="/dashboard.html" class="active">实时大屏</a>
    <a href="/recommend.html">推荐系统</a>
    <a href="/analysis.html">离线分析</a>
</div>
<div class="main-container">
    <div class="chart-panel">
        <h3><span class="dot"></span> 实时点击排行榜 (Top 10)</h3>
        <div id="hotChart"></div>
    </div>
    <div class="table-panel">
        <h3>详细排行数据</h3>
        <table id="hotTable">
            <thead><tr><th>排名</th><th>电影名称</th><th style="text-align:right">点击次数</th></tr></thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="text-align:center;color:#64748b;padding:40px">等待数据加载...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<div class="status-bar">
    <span class="live"><span class="dot"></span> 实时数据流 (2s模拟点击)</span>
    <span id="updateTime">等待首次更新...</span>
</div>
<script>
    const chart = echarts.init(document.getElementById('hotChart'));
    let option = {
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(p) { return '<strong>' + p[0].name + '</strong><br/>点击次数: <strong>' + p[0].value + '</strong>'; } },
        grid: { left: '3%', right: '6%', bottom: '6%', top: '8%', containLabel: true },
        xAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
        yAxis: { type: 'category', data: [], axisLabel: { color: '#e2e8f0', fontSize: 13, width: 140, overflow: 'truncate' }, axisLine: { show: false }, axisTick: { show: false } },
        series: [{ type: 'bar', data: [], barWidth: '55%', itemStyle: { borderRadius: [0,4,4,0], color: new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#3b82f6'},{offset:1,color:'#8b5cf6'}]) }, label: { show: true, position: 'right', color: '#e2e8f0', fontSize: 13, fontWeight: 'bold', formatter: function(p) { return p.value + ' 次'; } } }]
    };
    chart.setOption(option);
    const movieNames = { '101':'流浪地球','102':'给阿嫲的情书','103':'楚门的世界','104':'泰坦尼克号','105':'阿凡达','106':'盗梦空间','107':'霸王别姬','108':'喜剧之王' };
    async function fetchHotMovies() {
        try {
            const resp = await fetch('/api/dashboard/hot-movies?topN=10');
            const r = await resp.json();
            if (r.code===200 && r.data && r.data.length>0) updateDashboard(r.data);
            document.getElementById('updateTime').textContent = '最后更新: '+new Date().toLocaleTimeString('zh-CN')+' | 窗口: 10s/5s';
        } catch(e) { console.log('等待数据...', e.message); }
    }
    function updateDashboard(movies) {
        const rev = [...movies].reverse();
        chart.setOption({ yAxis: { data: rev.map(m=>movieNames[m.movieId]||'电影#'+m.movieId) }, series: [{ data: rev.map(m=>m.clickCount) }] });
        document.getElementById('tableBody').innerHTML = movies.map((m,i)=> {
            const rc = i<3 ? 'rank-'+(i+1) : 'rank-other';
            return '<tr><td><span class="rank-num '+rc+'">'+(i+1)+'</span></td><td>'+(movieNames[m.movieId]||'电影#'+m.movieId)+'</td><td style="text-align:right"><span class="count-badge">'+m.clickCount+' 次</span></td></tr>';
        }).join('');
    }
    fetchHotMovies(); setInterval(fetchHotMovies,3000);
    window.addEventListener('resize',()=>chart.resize());
</script>
</body>
</html>
