<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线数据分析 - Spark SQL</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; color: #e2e8f0; font-family: 'Microsoft YaHei',sans-serif; min-height: 100vh; }
        .header { text-align:center; padding:30px 0 20px; background:linear-gradient(135deg,#0d1f3c,#1a3a6b); border-bottom:2px solid #2a5a9a; }
        .header h1 { font-size:28px; letter-spacing:4px; background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header .subtitle { color:#94a3b8; font-size:13px; margin-top:8px; }
        .nav-bar { display:flex; justify-content:center; gap:4px; background:rgba(255,255,255,0.03); padding:10px; border-bottom:1px solid rgba(255,255,255,0.06); }
        .nav-bar a { color:#94a3b8; text-decoration:none; padding:8px 24px; border-radius:8px; font-size:14px; transition:all 0.3s; }
        .nav-bar a.active { background:rgba(96,165,250,0.15); color:#60a5fa; }
        .nav-bar a:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:20px; }
        .card h3 { color:#94a3b8; font-size:14px; margin-bottom:12px; }
        .card-full { grid-column:1/-1; }
        .chart-box { height:300px; width:100%; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        thead th { color:#60a5fa; font-size:12px; padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:left; }
        tbody td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.04); }
        .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:rgba(96,165,250,0.15); color:#60a5fa; }
        @media (max-width:768px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="header">
    <h1>离线数据分析</h1>
    <div class="subtitle">Spark SQL 分析结果 | 电影评分聚合与分类统计</div>
</div>
<div class="nav-bar">
    <a href="/dashboard.html">实时大屏</a>
    <a href="/recommend.html">推荐系统</a>
    <a href="/analysis.html" class="active">离线分析</a>
</div>
<div class="container">
    <div class="grid">
        <div class="card">
            <h3>电影分类统计</h3>
            <div id="categoryChart" class="chart-box"></div>
        </div>
        <div class="card">
            <h3>各分类平均评分</h3>
            <div id="categoryAvgChart" class="chart-box"></div>
        </div>
        <div class="card card-full">
            <h3>电影平均评分排行榜</h3>
            <div id="movieAvgChart" class="chart-box"></div>
        </div>
        <div class="card card-full">
            <h3>用户评分活跃度</h3>
            <table id="userTable">
                <thead><tr><th>用户ID</th><th>评分次数</th><th>平均评分</th><th>活跃度</th></tr></thead>
                <tbody id="userBody"><tr><td colspan="4" style="text-align:center;color:#64748b;padding:20px">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const colors = ['#60a5fa','#a78bfa','#f472b6','#34d399','#fbbf24','#f87171','#818cf8'];

    async function loadData() {
        // 分类统计
        const catResp = await fetch('/api/analysis/category-stats').then(r=>r.json());
        if (catResp.code===200) {
            const catData = catResp.data;
            echarts.init(document.getElementById('categoryChart')).setOption({
                tooltip:{trigger:'item',formatter:'{b}: {c}部 ({d}%)'},
                series:[{type:'pie',radius:['40%','70%'],data:catData.map((d,i)=>({name:d.category,value:d.count,itemStyle:{color:colors[i%colors.length]}})),label:{color:'#94a3b8',fontSize:12},labelLine:{lineStyle:{color:'rgba(255,255,255,0.1)'}}}]
            });
        }

        // 分类平均评分
        const catAvgResp = await fetch('/api/analysis/category-avg-ratings').then(r=>r.json());
        if (catAvgResp.code===200) {
            const cad = catAvgResp.data;
            echarts.init(document.getElementById('categoryAvgChart')).setOption({
                tooltip:{trigger:'axis'},
                xAxis:{type:'category',data:cad.map(d=>d.category),axisLabel:{color:'#94a3b8'}},
                yAxis:{type:'value',min:0,max:5,axisLabel:{color:'#94a3b8'},splitLine:{lineStyle:{color:'rgba(255,255,255,0.06)'}}},
                series:[{type:'bar',data:cad.map((d,i)=>({value:d.avgRating,itemStyle:{color:colors[i%colors.length]}})),barWidth:'50%',label:{show:true,position:'top',color:'#e2e8f0',formatter:function(p){return p.value.toFixed(2)}}}]
            });
        }

        // 电影平均评分
        const movResp = await fetch('/api/analysis/movie-avg-ratings').then(r=>r.json());
        if (movResp.code===200) {
            const md = movResp.data;
            const rev = [...md].reverse();
            echarts.init(document.getElementById('movieAvgChart')).setOption({
                tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:function(p){return p[0].name+'<br/>评分: '+p[0].value.toFixed(2)+' | 评价数: '+(md.find(m=>m.title===p[0].name)||{}).ratingCount}},
                grid:{left:'3%',right:'6%',bottom:'6%',top:'8%',containLabel:true},
                xAxis:{type:'value',min:0,max:5,axisLabel:{color:'#94a3b8'},splitLine:{lineStyle:{color:'rgba(255,255,255,0.06)'}}},
                yAxis:{type:'category',data:rev.map(m=>m.title),axisLabel:{color:'#e2e8f0',fontSize:12,width:200,overflow:'truncate'},axisLine:{show:false}},
                series:[{type:'bar',data:rev.map(m=>({value:m.avgRating,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#3b82f6'},{offset:1,color:'#8b5cf6'}])}})),barWidth:'50%',label:{show:true,position:'right',color:'#e2e8f0',formatter:function(p){return p.value.toFixed(2)}}}]
            });
        }

        // 用户活跃度
        const userResp = await fetch('/api/analysis/user-activity').then(r=>r.json());
        if (userResp.code===200) {
            document.getElementById('userBody').innerHTML = userResp.data.map(u => {
                const bar = Math.min(u.ratingCount/5*100,100);
                return '<tr><td>User '+u.userId+'</td><td>'+u.ratingCount+' 次</td><td>'+u.avgRating.toFixed(2)+'</td><td><div style="background:rgba(255,255,255,0.1);border-radius:10px;height:8px;width:100%"><div style="background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:10px;height:8px;width:'+bar+'%"></div></div></td></tr>';
            }).join('');
        }
    }
    loadData();
</script>
</body>
</html>
